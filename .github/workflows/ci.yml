name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test:coverage
      - run: pnpm -r lint
      - run: pnpm -r fmt

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @takehomeviz/web-e2e e2e:install
      - run: pnpm --filter @takehomeviz/web-e2e e2e
      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: packages/web-e2e/playwright-report
          retention-days: 14
